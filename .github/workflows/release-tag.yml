name: release-tag

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump to apply when running manually
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

jobs:
  release-tag:
    uses: benvon/reusable-workflows/.github/workflows/release-tag.yml@130a938eed408977d8c3159327f13306f422b1eb
    with:
      caller_event_name: ${{ github.event_name }}
      caller_sha: ${{ github.sha }}
      manual_release_type: ${{ github.event.inputs.release_type || '' }}
