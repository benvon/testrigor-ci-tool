name: release-policy

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  release-policy:
    uses: benvon/reusable-workflows/.github/workflows/release-policy.yml@130a938eed408977d8c3159327f13306f422b1eb
    with:
      pull_request_number: ${{ github.event.pull_request.number }}
