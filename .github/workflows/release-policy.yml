name: release-policy

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  release-policy:
    uses: benvon/reusable-workflows/.github/workflows/release-policy.yml@582850451229996e3bbf5d06a437dfcaa090701f
    with:
      pull_request_number: ${{ github.event.pull_request.number }}
