name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: benvon/reusable-workflows/.github/workflows/go-quality.yml@35c37bc452dc991c2c8cc88c4fc48e4d7f0e0aaf
    with:
      quality_command: make ci
      coverage_file: coverage/coverage.out
      upload_codecov: true
      codecov_flags: unittests
      codecov_name: codecov-umbrella
