name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: benvon/reusable-workflows/.github/workflows/go-quality.yml@cd087ac5ce4adfc261f319ac5df2545e02ec60cc
    with:
      quality_command: make ci
      coverage_file: coverage/coverage.out
      upload_codecov: true
      codecov_flags: unittests
      codecov_name: codecov-umbrella
