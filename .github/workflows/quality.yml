name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: benvon/reusable-workflows/.github/workflows/go-quality.yml@582850451229996e3bbf5d06a437dfcaa090701f
    with:
      quality_command: make ci
      coverage_file: coverage/coverage.out
      upload_codecov: true
      codecov_flags: unittests
      codecov_name: codecov-umbrella
