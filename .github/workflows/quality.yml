name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: benvon/reusable-workflows/.github/workflows/go-quality.yml@35c37bc4b4c72570ce464c783a71ec3d03c45d15
    with:
      quality_command: make ci
      coverage_file: coverage/coverage.out
      upload_codecov: true
      codecov_flags: unittests
      codecov_name: codecov-umbrella
